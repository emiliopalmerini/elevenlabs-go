name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Tag must be a Go semantic version, for example v0.1.0 or v0.1.0-rc.1: $tag" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Publish to Go module proxy
        env:
          MODULE: github.com/emiliopalmerini/elevenlabs-go
          TAG: ${{ github.ref_name }}
        run: |
          for attempt in 1 2 3 4 5; do
            if GOPROXY=https://proxy.golang.org go list -m "${MODULE}@${TAG}" >/dev/null; then
              echo "Published ${MODULE}@${TAG} to proxy.golang.org"
              exit 0
            fi
            echo "proxy.golang.org has not indexed ${MODULE}@${TAG} yet; retrying (${attempt}/5)"
            sleep 15
          done

          echo "Could not publish ${MODULE}@${TAG} to proxy.golang.org" >&2
          exit 1
